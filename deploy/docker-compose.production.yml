name: aumaf-prod

networks:
  aumaf_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [aumaf_internal]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [aumaf_internal]
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 384m

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    networks: [aumaf_internal]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 512m

  backend-migrate:
    image: ${IMAGE_BACKEND:-ghcr.io/kayorid/aumaf-3d-site/backend:latest}
    restart: "no"
    networks: [aumaf_internal]
    env_file: ../env/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/backend
    command: ["sh", "-c", "npx prisma migrate deploy && echo MIGRATIONS_OK"]

  backend:
    image: ${IMAGE_BACKEND:-ghcr.io/kayorid/aumaf-3d-site/backend:latest}
    restart: unless-stopped
    networks: [aumaf_internal]
    env_file: ../env/.env.production
    environment:
      MASTER_KEY_PATH: /etc/aumaf/master.key
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Master key para criptografia de integration_secrets (AES-256-GCM).
      # Gerada manualmente na VPS:
      #   openssl rand -out /etc/aumaf/master.key 32
      #   chown deploy:deploy /etc/aumaf/master.key && chmod 400 /etc/aumaf/master.key
      # Se ausente em produção, o backend RECUSA subir (process.exit 1).
      - /etc/aumaf/master.key:/etc/aumaf/master.key:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      backend-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 768m

  frontend-public:
    image: ${IMAGE_FRONTEND_PUBLIC:-ghcr.io/kayorid/aumaf-3d-site/frontend-public:latest}
    restart: unless-stopped
    networks: [aumaf_internal]
    env_file: ../env/.env.production
    environment:
      HOST: 0.0.0.0
      PORT: "4321"
    ports:
      - "127.0.0.1:4321:4321"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4321/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 384m

  frontend-admin:
    image: ${IMAGE_FRONTEND_ADMIN:-ghcr.io/kayorid/aumaf-3d-site/frontend-admin:latest}
    restart: unless-stopped
    networks: [aumaf_internal]
    ports:
      - "127.0.0.1:5174:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
    mem_limit: 192m

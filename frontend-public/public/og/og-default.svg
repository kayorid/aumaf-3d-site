<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ce268"/>
      <stop offset="100%" stop-color="#61c54f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#61c54f" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#61c54f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#7ce268" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Fundo -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Linha verde superior -->
  <line x1="80" y1="120" x2="1120" y2="120" stroke="#61c54f" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="80" cy="120" r="4" fill="#61c54f"/>
  <circle cx="1120" cy="120" r="4" fill="#61c54f"/>

  <!-- Tag de sistema -->
  <text x="80" y="100" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="500" letter-spacing="6" fill="#becab6" text-transform="uppercase">// MANUFATURA ADITIVA INDUSTRIAL</text>

  <!-- Logo grande -->
  <text x="80" y="290" font-family="'Pirulen', 'Space Grotesk', sans-serif" font-size="120" font-weight="700" fill="#ffffff" letter-spacing="6">AUMAF</text>
  <text x="80" y="410" font-family="'Pirulen', 'Space Grotesk', sans-serif" font-size="120" font-weight="700" fill="url(#green)" letter-spacing="6">3D</text>

  <!-- Subtitle -->
  <text x="80" y="490" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="400" fill="#cdcaca">Impressão 3D industrial de alta precisão</text>
  <text x="80" y="528" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="300" fill="#becab6">Tolerância ±0.05mm · Metal, carbono e polímeros</text>

  <!-- Localização -->
  <line x1="80" y1="570" x2="1120" y2="570" stroke="#61c54f" stroke-opacity="0.15" stroke-width="1"/>
  <text x="80" y="600" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="500" letter-spacing="4" fill="#7ce268" text-transform="uppercase">SÃO CARLOS · SP · BRASIL</text>

  <!-- Decorações canto direito -->
  <g opacity="0.5">
    <line x1="900" y1="240" x2="1120" y2="240" stroke="#61c54f" stroke-opacity="0.4" stroke-width="1"/>
    <line x1="900" y1="280" x2="1120" y2="280" stroke="#61c54f" stroke-opacity="0.2" stroke-width="1"/>
    <line x1="900" y1="320" x2="1120" y2="320" stroke="#61c54f" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="900" cy="240" r="3" fill="#61c54f"/>
    <circle cx="900" cy="280" r="3" fill="#61c54f" opacity="0.6"/>
    <circle cx="900" cy="320" r="3" fill="#61c54f"/>
    <text x="950" y="245" font-family="'Space Grotesk', sans-serif" font-size="13" letter-spacing="2" fill="#becab6">±0.05mm</text>
    <text x="950" y="285" font-family="'Space Grotesk', sans-serif" font-size="13" letter-spacing="2" fill="#becab6">+500 PROJETOS</text>
    <text x="950" y="325" font-family="'Space Grotesk', sans-serif" font-size="13" letter-spacing="2" fill="#becab6">DESDE 2022</text>
  </g>
</svg>

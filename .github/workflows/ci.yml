name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aumaf
          POSTGRES_PASSWORD: aumaf123
          POSTGRES_DB: aumaf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aumaf"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aumaf:aumaf123@localhost:5432/aumaf_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-aumaf-3d-do-not-use-in-prod-XXXXXXXX
      NODE_ENV: test
      ADMIN_EMAIL: ci@aumaf.test
      ADMIN_PASSWORD: ci-admin-password
      ADMIN_NAME: Admin CI
      FRONTEND_ADMIN_URL: http://localhost:5174
      FRONTEND_PUBLIC_URL: http://localhost:4321
      BACKEND_URL: http://localhost:3000
      STORAGE_DRIVER: fs
      S3_ENDPOINT: http://localhost:9000
      S3_PUBLIC_URL: http://localhost:9000
      S3_ACCESS_KEY: ci-key
      S3_SECRET_KEY: ci-secret
      S3_BUCKET: aumaf-blog-images
      AI_PROVIDER: anthropic
      LOG_FORMAT: text
      EMAIL_TRANSPORT: stub
      BOTYIO_ENABLED: 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Lint (non-blocking — eslint config pre-existing TODO)
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
